kind = "web"
previewPath = "/"
title = "Leadership Assessment Platform"
version = "1.0.0"
id = "artifacts/assessment-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19062

[services.development]
run = "pnpm --filter @workspace/assessment-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assessment-platform", "run", "build" ]
publicDir = "artifacts/assessment-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19062"
BASE_PATH = "/"
